name: Daily Article Generation

on:
  schedule:
    # Her gün saat 09:00 UTC (Türkiye saatiyle 12:00)
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      bulk:
        description: 'bulk-topics.txt dosyasından toplu makale üret'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch today's trending topics (normal mod)
        if: ${{ github.event.inputs.bulk != 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node fetch-trends.js --geo US --count 8 --out=daily-topics.txt

      - name: Generate articles from trending topics (normal mod)
        if: ${{ github.event.inputs.bulk != 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate-article.js --batch daily-topics.txt

      - name: Generate articles from bulk-topics.txt (bulk mod)
        if: ${{ github.event.inputs.bulk == 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate-article.js --batch bulk-topics.txt

      - name: Commit and push new articles
        run: |
          git config user.name "InfoDaily Bot"
          git config user.email "bot@infodaily.com"
          git add content/posts/ daily-topics.txt
          if git diff --staged --quiet; then
            echo "No new articles to commit (all already exist)"
          else
            ARTICLE_COUNT=$(git diff --staged --name-only | grep '\.md$' | wc -l)
            git commit -m "chore: add $ARTICLE_COUNT articles [$(date +%Y-%m-%d)]"
            git push
          fi

      - name: Submit new URLs to IndexNow
        run: node submit-indexnow.js

      - name: Tweet new articles
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: node scripts/tweet-articles.js
