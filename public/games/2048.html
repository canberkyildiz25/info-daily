<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f172a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: system-ui, sans-serif;
    color: #f8fafc;
    padding: 16px;
    user-select: none;
  }
  h1 { font-size: 1.6rem; font-weight: 900; color: #fb923c; letter-spacing: 0.05em; margin-bottom: 8px; }
  #stats { display: flex; gap: 20px; margin-bottom: 14px; }
  .stat-box {
    background: #1e293b;
    border-radius: 10px;
    padding: 8px 18px;
    text-align: center;
    min-width: 70px;
  }
  .stat-label { font-size: 0.65rem; font-weight: 800; color: #94a3b8; letter-spacing: 0.1em; text-transform: uppercase; }
  .stat-val { font-size: 1.1rem; font-weight: 900; color: #f8fafc; }
  #board {
    background: #1e293b;
    border-radius: 14px;
    padding: 10px;
    display: grid;
    grid-template-columns: repeat(4, 72px);
    grid-template-rows: repeat(4, 72px);
    gap: 8px;
    touch-action: none;
  }
  .tile {
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 1.5rem;
    transition: background .1s;
  }
  .t0    { background: #0f172a; }
  .t2    { background: #fef3c7; color: #78350f; }
  .t4    { background: #fde68a; color: #78350f; }
  .t8    { background: #fdba74; color: #7c2d12; }
  .t16   { background: #fb923c; color: #fff; }
  .t32   { background: #f97316; color: #fff; }
  .t64   { background: #ea580c; color: #fff; }
  .t128  { background: #facc15; color: #78350f; font-size: 1.2rem; }
  .t256  { background: #eab308; color: #78350f; font-size: 1.2rem; }
  .t512  { background: #ca8a04; color: #fff; font-size: 1.1rem; }
  .t1024 { background: #a16207; color: #fff; font-size: 0.95rem; }
  .t2048 { background: #854d0e; color: #fbbf24; font-size: 0.95rem; }
  .t-hi  { background: #581c87; color: #e9d5ff; font-size: 0.85rem; }
  #overlay {
    position: fixed; inset: 0;
    background: rgba(15,23,42,0.85);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 10;
  }
  #overlay.show { display: flex; }
  #ov-msg { font-size: 1.8rem; font-weight: 900; color: #fb923c; }
  #ov-sub { font-size: 0.9rem; color: #94a3b8; }
  button {
    background: #fb923c;
    color: #0f172a;
    font-weight: 900;
    border: none;
    border-radius: 999px;
    padding: 10px 28px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: opacity .15s;
  }
  button:hover { opacity: 0.85; }
  #hint { font-size: 0.72rem; color: #475569; margin-top: 10px; }
</style>
</head>
<body>
<h1>2048</h1>
<div id="stats">
  <div class="stat-box"><div class="stat-label">Score</div><div class="stat-val" id="score">0</div></div>
  <div class="stat-box"><div class="stat-label">Best</div><div class="stat-val" id="best">0</div></div>
</div>
<div id="board"></div>
<p id="hint">Arrow keys or swipe to move tiles</p>

<div id="overlay">
  <div id="ov-msg"></div>
  <div id="ov-sub"></div>
  <button onclick="newGame()">NEW GAME</button>
</div>

<script>
let grid, score, best = 0, won = false;

function newGame() {
  grid = Array.from({ length: 4 }, () => Array(4).fill(0));
  score = 0; won = false;
  document.getElementById('overlay').classList.remove('show');
  addTile(); addTile();
  render();
}

function addTile() {
  const empty = [];
  grid.forEach((row, r) => row.forEach((v, c) => { if (!v) empty.push([r, c]); }));
  if (!empty.length) return;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  grid.forEach(row => row.forEach(v => {
    const d = document.createElement('div');
    const cls = v >= 2048 ? 't-hi' : v ? `t${v}` : 't0';
    d.className = `tile ${cls}`;
    d.textContent = v || '';
    board.appendChild(d);
  }));
  document.getElementById('score').textContent = score;
  if (score > best) { best = score; document.getElementById('best').textContent = best; }
}

function slide(row) {
  let r = row.filter(v => v);
  for (let i = 0; i < r.length - 1; i++) {
    if (r[i] === r[i + 1]) { r[i] *= 2; score += r[i]; r.splice(i + 1, 1); i++; }
  }
  while (r.length < 4) r.push(0);
  return r;
}

function move(dir) {
  let moved = false;
  const g = grid.map(r => [...r]);

  if (dir === 'left' || dir === 'right') {
    for (let r = 0; r < 4; r++) {
      let row = dir === 'right' ? [...grid[r]].reverse() : [...grid[r]];
      const slid = slide(row);
      if (dir === 'right') slid.reverse();
      if (slid.some((v, i) => v !== grid[r][i])) moved = true;
      grid[r] = slid;
    }
  } else {
    for (let c = 0; c < 4; c++) {
      let col = grid.map(r => r[c]);
      if (dir === 'down') col.reverse();
      const slid = slide(col);
      if (dir === 'down') slid.reverse();
      if (slid.some((v, i) => v !== g[i][c])) moved = true;
      slid.forEach((v, r) => grid[r][c] = v);
    }
  }

  if (!moved) return;
  addTile();
  render();

  if (!won && grid.some(r => r.includes(2048))) {
    won = true;
    showOverlay('YOU WIN!', 'Keep going or start over');
    return;
  }
  if (isOver()) showOverlay('GAME OVER', `Final score: ${score}`);
}

function isOver() {
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++) {
      if (!grid[r][c]) return false;
      if (c < 3 && grid[r][c] === grid[r][c+1]) return false;
      if (r < 3 && grid[r][c] === grid[r+1][c]) return false;
    }
  return true;
}

function showOverlay(msg, sub) {
  document.getElementById('ov-msg').textContent = msg;
  document.getElementById('ov-sub').textContent = sub;
  document.getElementById('overlay').classList.add('show');
}

// Keyboard
document.addEventListener('keydown', e => {
  const map = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down' };
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

// Swipe
let sx, sy;
document.getElementById('board').addEventListener('touchstart', e => {
  sx = e.touches[0].clientX; sy = e.touches[0].clientY;
}, { passive: true });
document.getElementById('board').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - sx;
  const dy = e.changedTouches[0].clientY - sy;
  if (Math.abs(dx) > Math.abs(dy)) move(dx > 20 ? 'right' : 'left');
  else move(dy > 20 ? 'down' : 'up');
}, { passive: true });

newGame();
</script>
</body>
</html>
