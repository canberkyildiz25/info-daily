<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f172a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: system-ui, sans-serif;
    color: #f8fafc;
    padding: 16px;
    user-select: none;
  }
  h1 { font-size: 1.4rem; font-weight: 900; letter-spacing: 0.1em; margin-bottom: 8px; color: #a78bfa; }
  #stats { display: flex; gap: 24px; margin-bottom: 16px; font-size: 0.8rem; color: #94a3b8; font-weight: 600; }
  #stats span { color: #f8fafc; font-size: 1rem; font-weight: 800; }
  #grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    max-width: 320px;
    width: 100%;
  }
  .card {
    aspect-ratio: 1;
    cursor: pointer;
    perspective: 600px;
    border-radius: 10px;
  }
  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .35s ease;
    border-radius: 10px;
  }
  .card.flipped .card-inner, .card.matched .card-inner {
    transform: rotateY(180deg);
  }
  .card-front, .card-back {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .card-front {
    background: #1e293b;
    border: 2px solid #334155;
    color: #475569;
    font-size: 1.2rem;
    font-weight: 900;
  }
  .card-back {
    background: #1e1b4b;
    border: 2px solid #4c1d95;
    transform: rotateY(180deg);
  }
  .card.matched .card-back {
    background: #14532d;
    border-color: #166534;
  }
  #win-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-top: 20px;
    animation: fadeIn .4s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  #win-msg { font-size: 1.5rem; font-weight: 900; color: #4ade80; }
  #win-sub { font-size: 0.85rem; color: #94a3b8; }
  button {
    background: #a78bfa;
    color: #0f172a;
    font-weight: 900;
    border: none;
    border-radius: 999px;
    padding: 10px 28px;
    font-size: 0.9rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity .15s;
    margin-top: 4px;
  }
  button:hover { opacity: 0.85; }
</style>
</head>
<body>
<h1>MEMORY</h1>
<div id="stats">
  MOVES <span id="moves">0</span>
  &nbsp;&nbsp;PAIRS <span id="pairs">0</span>/8
</div>
<div id="grid"></div>
<div id="win-screen">
  <div id="win-msg">YOU WIN!</div>
  <div id="win-sub"></div>
  <button onclick="init()">PLAY AGAIN</button>
</div>
<script>
const EMOJIS = ['🎮','🕹️','🎯','🏆','⭐','🎲','🔮','🎪'];
let cards = [], flipped = [], moves = 0, pairs = 0, locked = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function init() {
  moves = 0; pairs = 0; flipped = []; locked = false;
  document.getElementById('moves').textContent = 0;
  document.getElementById('pairs').textContent = 0;
  document.getElementById('win-screen').style.display = 'none';

  const vals = shuffle([...EMOJIS, ...EMOJIS]);
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cards = vals.map((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="card-inner"><div class="card-front">?</div><div class="card-back">${emoji}</div></div>`;
    card.dataset.val = emoji;
    card.addEventListener('click', () => flip(card));
    grid.appendChild(card);
    return card;
  });
}

function flip(card) {
  if (locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  card.classList.add('flipped');
  flipped.push(card);
  if (flipped.length === 2) {
    locked = true;
    moves++;
    document.getElementById('moves').textContent = moves;
    setTimeout(check, 700);
  }
}

function check() {
  const [a, b] = flipped;
  if (a.dataset.val === b.dataset.val) {
    a.classList.add('matched'); b.classList.add('matched');
    pairs++;
    document.getElementById('pairs').textContent = pairs;
    if (pairs === 8) {
      const ws = document.getElementById('win-screen');
      document.getElementById('win-sub').textContent = `Completed in ${moves} moves!`;
      ws.style.display = 'flex';
    }
  } else {
    a.classList.remove('flipped');
    b.classList.remove('flipped');
  }
  flipped = [];
  locked = false;
}

init();
</script>
</body>
</html>
