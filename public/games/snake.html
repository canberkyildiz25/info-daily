<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f172a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: system-ui, sans-serif;
    color: #f8fafc;
    user-select: none;
  }
  h1 { font-size: 1.4rem; font-weight: 900; letter-spacing: 0.1em; margin-bottom: 8px; color: #4ade80; }
  #score-bar { display: flex; gap: 24px; margin-bottom: 12px; font-size: 0.8rem; color: #94a3b8; font-weight: 600; }
  #score-bar span { color: #f8fafc; font-size: 1rem; font-weight: 800; }
  canvas {
    border: 2px solid #1e293b;
    border-radius: 12px;
    background: #0f172a;
    display: block;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    pointer-events: none;
  }
  #msg { font-size: 1.6rem; font-weight: 900; color: #4ade80; text-align: center; }
  #sub { font-size: 0.85rem; color: #94a3b8; text-align: center; }
  #btn {
    pointer-events: all;
    background: #4ade80;
    color: #0f172a;
    font-weight: 900;
    border: none;
    border-radius: 999px;
    padding: 10px 28px;
    font-size: 0.9rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity .15s;
  }
  #btn:hover { opacity: 0.85; }
  #dpad {
    display: none;
    grid-template-columns: repeat(3, 44px);
    grid-template-rows: repeat(3, 44px);
    gap: 4px;
    margin-top: 14px;
  }
  @media (pointer: coarse) { #dpad { display: grid; } }
  .dp {
    background: #1e293b;
    border: none;
    border-radius: 8px;
    color: #94a3b8;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .1s;
  }
  .dp:active { background: #334155; }
  .dp-blank { pointer-events: none; }
</style>
</head>
<body>
<h1>SNAKE</h1>
<div id="score-bar">
  SCORE <span id="score">0</span>
  &nbsp;&nbsp;BEST <span id="best">0</span>
</div>
<div style="position:relative">
  <canvas id="c"></canvas>
  <div id="overlay">
    <div id="msg">SNAKE</div>
    <div id="sub">Use arrow keys or swipe to move</div>
    <button id="btn">PLAY</button>
  </div>
</div>
<div id="dpad">
  <div class="dp-blank"></div>
  <button class="dp" id="up">▲</button>
  <div class="dp-blank"></div>
  <button class="dp" id="left">◀</button>
  <div class="dp-blank"></div>
  <button class="dp" id="right">▶</button>
  <div class="dp-blank"></div>
  <button class="dp" id="down">▼</button>
  <div class="dp-blank"></div>
</div>
<script>
const CELL = 20;
const COLS = 20, ROWS = 20;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

const overlay = document.getElementById('overlay');
const msgEl = document.getElementById('msg');
const subEl = document.getElementById('sub');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');

let snake, dir, nextDir, food, score, best = 0, running = false, raf;

function rand(n) { return Math.floor(Math.random() * n); }
function placeFood() {
  let pos;
  do { pos = { x: rand(COLS), y: rand(ROWS) }; }
  while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function start() {
  snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
  dir = { x: 1, y: 0 }; nextDir = { x: 1, y: 0 };
  score = 0; scoreEl.textContent = 0;
  placeFood();
  overlay.style.display = 'none';
  running = true;
  if (raf) cancelAnimationFrame(raf);
  loop();
}

function loop() {
  if (!running) return;
  setTimeout(() => {
    raf = requestAnimationFrame(loop);
    tick();
    draw();
  }, 130);
}

function tick() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || snake.some(s => s.x === head.x && s.y === head.y)) {
    running = false;
    if (score > best) { best = score; bestEl.textContent = best; }
    msgEl.textContent = 'GAME OVER';
    subEl.textContent = `Score: ${score}`;
    document.getElementById('btn').textContent = 'PLAY AGAIN';
    overlay.style.display = 'flex';
    return;
  }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score++; scoreEl.textContent = score;
    placeFood();
  } else {
    snake.pop();
  }
}

function draw() {
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // grid dots
  ctx.fillStyle = '#1e293b';
  for (let x = 0; x < COLS; x++)
    for (let y = 0; y < ROWS; y++)
      ctx.fillRect(x * CELL + CELL/2 - 1, y * CELL + CELL/2 - 1, 2, 2);
  // food
  ctx.fillStyle = '#f87171';
  ctx.beginPath();
  ctx.arc(food.x * CELL + CELL/2, food.y * CELL + CELL/2, CELL/2 - 2, 0, Math.PI * 2);
  ctx.fill();
  // snake
  snake.forEach((s, i) => {
    const t = 1 - i / snake.length;
    ctx.fillStyle = `hsl(142, 70%, ${30 + t * 25}%)`;
    const r = i === 0 ? 6 : 4;
    ctx.beginPath();
    ctx.roundRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2, r);
    ctx.fill();
  });
}

document.getElementById('btn').addEventListener('click', start);

const DIRS = {
  ArrowUp:    { x: 0, y: -1 }, ArrowDown:  { x: 0, y: 1 },
  ArrowLeft:  { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 },
};
document.addEventListener('keydown', e => {
  const d = DIRS[e.key];
  if (d && !(d.x === -dir.x && d.y === -dir.y)) { e.preventDefault(); nextDir = d; }
});

// dpad
document.getElementById('up').addEventListener('click',    () => { if (dir.y !== 1)  nextDir = { x: 0, y: -1 }; });
document.getElementById('down').addEventListener('click',  () => { if (dir.y !== -1) nextDir = { x: 0, y: 1 }; });
document.getElementById('left').addEventListener('click',  () => { if (dir.x !== 1)  nextDir = { x: -1, y: 0 }; });
document.getElementById('right').addEventListener('click', () => { if (dir.x !== -1) nextDir = { x: 1, y: 0 }; });

// swipe
let sx, sy;
canvas.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, { passive: true });
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - sx;
  const dy = e.changedTouches[0].clientY - sy;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 20 && dir.x !== -1) nextDir = { x: 1, y: 0 };
    else if (dx < -20 && dir.x !== 1) nextDir = { x: -1, y: 0 };
  } else {
    if (dy > 20 && dir.y !== -1) nextDir = { x: 0, y: 1 };
    else if (dy < -20 && dir.y !== 1) nextDir = { x: 0, y: -1 };
  }
}, { passive: true });

draw();
</script>
</body>
</html>
